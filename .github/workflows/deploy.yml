name: Build, Package, and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Compile Application
        run: make

      - name: Prepare Debian Package
        run: |
          mkdir -p package_build/usr/bin
          mkdir -p package_build/usr/share/catbrowser/about.rtfd
          cp catbrowser package_build/usr/bin/
          cp cathome.html package_build/usr/share/catbrowser/
          cp about.rtfd/sammy.png package_build/usr/share/catbrowser/about.rtfd/
          chmod 755 package_build/usr/bin/catbrowser
          dpkg-deb --build package_build catbrowser_1.0_amd64.deb

      - name: Upload .deb Artifact
        uses: actions/upload-artifact@v3
        with:
          name: catbrowser-debian-package
          path: catbrowser_1.0_amd64.deb

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-deb
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Prepare Pages Artifact
        run: |
          mkdir -p public
          cp cathome.html public/index.html
          cp -r about.rtfd public/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
