name: Build, Package, and Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.0-dev dpkg-dev

      - name: Compile Application
        run: make

      - name: Prepare Debian Package Base
        run: |
          mkdir -p package_build/usr/bin
          mkdir -p package_build/usr/share/catbrowser/about.rtfd
          cp catbrowser package_build/usr/bin/
          cp cathome.html package_build/usr/share/catbrowser/
          cp about.rtfd/sammy.png package_build/usr/share/catbrowser/about.rtfd/
          chmod 755 package_build/usr/bin/catbrowser
          dpkg-deb --build package_build catbrowser_1.0_amd64.deb

      - name: Create APT Repository Structure
        run: |
          mkdir -p public
          # Move the deb file to the public directory
          cp catbrowser_1.0_amd64.deb public/
          
          # CRITICAL FIX: Generate standard index file manually to avoid path doubling issues
          echo "Package: catbrowser" > public/Packages
          echo "Version: 1.0.0" >> public/Packages
          echo "Architecture: amd64" >> public/Packages
          echo "Maintainer: redcat243 <redcat243@github.com>" >> public/Packages
          echo "Depends: libgtk-3-0, libwebkit2gtk-4.0-37" >> public/Packages
          echo "Filename: catbrowser_1.0_amd64.deb" >> public/Packages
          echo "Size: $(wc -c < catbrowser_1.0_amd64.deb)" >> public/Packages
          echo "MD5sum: $(md5sum catbrowser_1.0_amd64.deb | cut -d' ' -f1)" >> public/Packages
          echo "SHA1: $(sha1sum catbrowser_1.0_amd64.deb | cut -d' ' -f1)" >> public/Packages
          echo "SHA256: $(sha256sum catbrowser_1.0_amd64.deb | cut -d' ' -f1)" >> public/Packages
          echo "Description: CatBrowser - Private WebKit Core Enabled Browser" >> public/Packages
          
          # Compress the Packages file
          gzip -c public/Packages > public/Packages.gz

      - name: Prepare Pages Frontend
        run: |
          cp cathome.html public/index.html
          cp -r about.rtfd public/

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
