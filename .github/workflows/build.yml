name: Build Tweak
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
      - name: Setup iOS SDK
        run: |
          # We clone the official SDK repo directly into the Theos folder
          # --depth 1 makes it much faster by only grabbing the latest files
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
          
      - name: Build Package
        run: |
          export THEOS=~/theos
          # Added 'messages=yes' so we can see what's happening if it fails
          make package messages=yes FINALPACKAGE=1
          
      - name: Upload Finished Deb
        uses: actions/upload-artifact@v4
        with:
          name: AndroidPattern-Package
          path: packages/*.deb
