name: Build Tweak
on: [push, pull_request, workflow_dispatch] # workflow_dispatch lets you run it manually

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          
      - name: Setup iOS SDK
        run: |
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks
          
      - name: Build Package
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Finished Deb
        uses: actions/upload-artifact@v3
        with:
          name: AndroidPattern-Package
          path: packages/*.deb